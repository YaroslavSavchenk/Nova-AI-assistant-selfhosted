brain:
  provider: ollama
  model: qwen3:14b
  base_url: http://localhost:11434
  thinking: false  # Enable /think for tool calls, complex reasoning
  thinking_fast: false  # /no_think for casual chat

memory:
  db_path: data/memory.db
  max_context_messages: 20  # How many messages to keep in context window
  long_term_enabled: true   # Persist facts and session summaries across restarts
  semantic_search: false    # Set true + ollama pull nomic-embed-text to enable ChromaDB

voice:
  enabled: false
  stt:
    model_size: base        # "base", "small", "medium", "large-v3", "distil-large-v3"
    language: null          # null = auto-detect, or "en", "nl", "ru"
    device: cpu             # "cpu" recommended to save VRAM for the LLM
    silence_seconds: 5.0    # Seconds of silence before Nova stops listening and responds
  tts:
    language: en            # "en", "nl", "ru" — selects the edge-tts neural voice
  wake_word:
    enabled: true                    # Say "Hey Nova" or just "Nova" to trigger

modules:
  web_search: true
  system_monitor: true
  todo_reminders: true
  research: true
  spotify: true
  calendar: true
  calendar_id: "your.email@gmail.com"   # Your Google Calendar email
  calendar_timezone: "Europe/Amsterdam" # IANA timezone for new events

  # PC Control — let Nova run shell commands, open apps, and interact with files
  pc_control: false
  pc_control_allowed_commands:
    - ls
    - cat
    - head
    - tail
    - pwd
    - whoami
    - date
    - df
    - du
    - ps
    - code
    - claude
    - which
    - echo
    - wc
    - sort
    - find
    - grep
    # Windows commands (accessible from WSL2)
    - powershell.exe
    - cmd.exe
    - wslpath
    - ipconfig.exe
    - tasklist.exe
  pc_control_writable_dirs:
    - ~/Documents
    - ~/notes
  pc_control_command_timeout: 30

# Register your development projects here so Nova can work with them.
# Used by pc_list_projects, pc_claude_code (project param), and project notes.
projects:
  # my-project:
  #   path: ~/projects/my-project
  #   description: "Short description of the project"

logging:
  level: INFO
  file: null  # Set to a path to log to file
