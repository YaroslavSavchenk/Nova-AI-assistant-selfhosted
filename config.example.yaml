brain:
  provider: ollama
  model: qwen3:14b
  base_url: http://localhost:11434
  thinking: false  # Enable /think for tool calls, complex reasoning
  thinking_fast: false  # /no_think for casual chat

memory:
  db_path: data/memory.db
  max_context_messages: 20  # How many messages to keep in context window

voice:
  enabled: false
  stt:
    model_size: base        # "base", "small", "medium", "large-v3", "distil-large-v3"
    language: null          # null = auto-detect, or "en", "nl", "ru"
    device: cpu             # "cpu" recommended to save VRAM for the LLM
    silence_seconds: 5.0    # Seconds of silence before Nova stops listening and responds
  tts:
    model: tts_models/multilingual/multi-dataset/xtts_v2
    speaker_wav: null       # Path to reference audio for voice cloning, or null for default
    language: en
    device: cpu
  wake_word:
    enabled: true                    # Say "Hey Nova" or just "Nova" to trigger

modules:
  web_search: true
  system_monitor: true
  todo_reminders: true

logging:
  level: INFO
  file: null  # Set to a path to log to file
